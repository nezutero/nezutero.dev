<div class="post-stats">
  <span id="view-count">–</span> views ·
  <button id="like-btn" type="button">
    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="17 11 12 6 7 11"></polyline>
      <polyline points="17 18 12 13 7 18"></polyline>
    </svg>
    <span id="like-count">–</span>
  </button>
</div>

<style>
  .post-stats {
    margin: 2rem 0;
    text-align: left;
    font-size: 0.9rem;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 0.5rem;
  }
  .post-stats button {
    background: none;
    border: 1px solid currentColor;
    border-radius: 999px;
    padding: 0.25rem 0.75rem;
    font-size: 0.9rem;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }
  .post-stats button:disabled { opacity: 0.6; cursor: default; }
  .post-stats button.liked {
    background: #ffe08a;
    border-color: #ffe08a;
  }
</style>

<script>
(function () {
  var namespace = "nezutero.dev";
  var slug = "{{ .RelPermalink }}".replace(/^\/|\/$/g, "").replace(/\//g, "-") || "home";
  var viewKey = "views-" + slug;
  var likeKey = "like-" + slug;
  var viewedFlag = "viewed-" + slug;   // sessionStorage: resets when tab closes
  var likedFlag = "liked-" + slug;     // localStorage: sticks forever

  var viewEl = document.getElementById("view-count");
  var likeBtn = document.getElementById("like-btn");
  var likeCountEl = document.getElementById("like-count");
  var base = "https://abacus.jasoncameron.dev";

  // page views: only hit once per browser session, otherwise just read
  var viewPromise = sessionStorage.getItem(viewedFlag)
    ? fetch(base + "/get/" + namespace + "/" + viewKey)
    : fetch(base + "/hit/" + namespace + "/" + viewKey);

  viewPromise
    .then(function (r) { return r.json(); })
    .then(function (data) {
      viewEl.textContent = data.value;
      sessionStorage.setItem(viewedFlag, "1");
    })
    .catch(function () { viewEl.textContent = "–"; });

  // likes: read current count, increment once per browser on click
  fetch(base + "/get/" + namespace + "/" + likeKey)
    .then(function (r) { return r.json(); })
    .then(function (data) { likeCountEl.textContent = data.value; })
    .catch(function () { likeCountEl.textContent = "0"; });

  if (localStorage.getItem(likedFlag)) {
    likeBtn.disabled = true;
    likeBtn.classList.add("liked");
  }

  likeBtn.addEventListener("click", function () {
    if (localStorage.getItem(likedFlag)) return;
    fetch(base + "/hit/" + namespace + "/" + likeKey)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        likeCountEl.textContent = data.value;
        localStorage.setItem(likedFlag, "1");
        likeBtn.disabled = true;
        likeBtn.classList.add("liked");
      });
  });
})();
</script>
